<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form validation</title>
    <script>
        function validateform(){
            var name=document.myform.name.value;
            var password=document.myform.password.value;
            var phone=document.myform.phone.value;
            var phoneNum = /^\(?[0-9]{3})\)?[0-9]{3}[-.]?([0-9]{4})$/;
            if(name==null || name==""){
                alert("Name can't be blank");
                return false;
            }
            else if(password.length<6){
                alert("Password must be at least 6 characters long.");
                return false;
            }
            else if(phone == ""|| !phoneNum.test(phone)){
                alert("Please enter 10 digit phone number.");
                phone.focus();
                return false;
            }
        }
    </script>
</head>
<body>
    <form name="myform" onsubmit="return validateform()">
        <label class="red">Name:</label><input type="text" name="name" ><br/><br>
        <label class="red">Password:</label><input type="password" name="password"><br/><br>
        <label class="red">Phone:</label><input type="number" name="phone"><br/><br>
        <label class="red">Date of Birth:</label><input type="date" name="dob"><br/><br>
        <label class="red">Address:</label><input type="text" name="address"><br/><br>
        <label class="red">State:</label><input type="text" name="state"><br/><br>
        <label class="red">City:</label><input type="text" name="city"><br/><br>
        <label class="red">Pin code:</label><input type="text" name="pin"><br/><br>
        <input type="submit" value="Register">
    </form>
</body>
</html>
